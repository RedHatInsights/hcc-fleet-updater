# This rule is not used by the project hcc-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to hcc.redhat.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hcc-operator
    app.kubernetes.io/managed-by: kustomize
  name: hccfleetupdate-viewer-role
rules:
- apiGroups:
  - hcc.redhat.com
  resources:
  - hccfleetupdates
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - hcc.redhat.com
  resources:
  - hccfleetupdates/status
  verbs:
  - get
